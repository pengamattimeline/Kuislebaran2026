<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUIS LEBARAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,400&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f;
            --emerald: #064e3b;
            --white: #ffffff;
            --red: #ff4757;
            --green-light: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #042f2e;
            background-image: radial-gradient(circle at center, #065f46 0%, #042f2e 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--white); overflow: hidden; padding: 20px;
        }

        #main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold);
            padding: 30px 20px; border-radius: 30px;
            text-align: center; width: 100%; max-width: 420px;
            position: relative; z-index: 20;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        h2 { font-family: 'Crimson Text', serif; color: var(--gold); margin-bottom: 10px; font-size: 1.8rem; }

        .score-badge {
            background: var(--gold); color: #000;
            padding: 5px 15px; border-radius: 20px;
            font-weight: bold; font-size: 0.8rem; margin-bottom: 15px; display: inline-block;
        }

        input[type="text"] {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 15px; border: 1px solid var(--gold);
            background: rgba(255,255,255,0.15); color: white;
            text-align: center; outline: none; font-size: 1rem;
        }

        .btn-main {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: #064e3b; border: none; padding: 15px;
            border-radius: 15px; font-weight: 800; cursor: pointer;
            width: 100%; transition: 0.3s; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .hidden { display: none; }

        #key-hint { font-size: 0.85rem; margin-top: 12px; font-weight: 600; min-height: 20px; }

        #music-toggle {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold);
            color: white; width: 45px; height: 45px; border-radius: 50%; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        .giphy-img { width: 200px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .falling-item { position: absolute; top: -60px; pointer-events: none; z-index: 1; font-size: 25px; }

        .btn-whatsapp {
    background-color: #25d366;
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    border-radius: 15px;
    margin-top: 20px;
    font-weight: bold;
    font-size: 0.9rem;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
    transition: 0.3s;
}

.btn-whatsapp:active {
    transform: scale(0.95);
}
    </style>
</head>

<audio id="bgMusic" loop preload="auto">
    <source src="marhaban.mp3" type="audio/mpeg">
</audio>
    <audio id="sfxWin" preload="auto">
    <source src="animewow.mp3" type="audio/mpeg">
</audio>
<audio id="sfxLose" preload="auto">
    <source src="spongebobfail.mp3" type="audio/mpeg">
</audio>

<button id="music-toggle" onclick="toggleMusic()">🔇</button>

<div id="main-card">
    <div id="intro-box">
        <img src="https://media.giphy.com/media/oPso1zAFajEx8tQSl9/giphy.gif" style="width: 130px;" alt="Penguin">
        <h2>Tes IQ Lebaran</h2>
        <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 15px;">Ayo tes pengetahuanmu soal lebaran</p>
        <input type="text" id="sender-name" placeholder="Tulis namamu?">
        <button class="btn-main" onclick="startQuiz()">Mulai Kuis</button>
    </div>

    <div id="quiz-box" class="hidden">
        <div class="score-badge">Soal <span id="current-q">1</span>/5</div>
        <p id="q-text" style="font-size: 1.1rem; font-weight: 600; margin-bottom: 10px;"></p>
        <input type="text" id="ans-input" placeholder="Jawaban kamu..." autocomplete="off">
        <button class="btn-main" id="submit-btn" onclick="check()">Kirim Jawaban</button>
        <p id="key-hint"></p>
    </div>

    <div id="wish-box" class="hidden">
        <div id="result-img-container"></div>
        <div id="status-text" style="font-size: 1.6rem; font-weight: 900; margin: 5px 0;"></div>
        <h2 style="margin-bottom: 5px; color: #fff;">Skor: <span id="final-score" style="color: var(--gold);">0</span></h2>
        <p id="from-text" style="color: var(--gold); font-weight: 600; font-size: 0.95rem; margin-bottom: 10px;"></p>
        <p id="final-wish" style="line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px;"></p>
        <p style="font-size: 0.7rem; opacity: 0.5;">- Minal Aidin Wal Faizin dari Choirunfiqri-</p>
        <a href="#" id="wa-share" class="btn-whatsapp">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884 0 2.225.569 3.945 1.594 5.672l-.999 3.647 3.894-.919zm11.387-5.477c-.31-.156-1.834-.905-2.112-1.006-.277-.101-.48-.151-.681.151-.202.302-.782 1.006-.958 1.208-.176.202-.353.227-.663.071-.31-.156-1.31-.483-2.496-1.541-.923-.824-1.545-1.841-1.726-2.143-.182-.303-.019-.467.135-.621.14-.139.31-.362.466-.543.156-.181.208-.31.311-.517.104-.207.052-.388-.026-.543-.078-.156-.681-1.641-.933-2.248-.246-.591-.496-.511-.681-.521l-.58-.01c-.202 0-.53.076-.807.378-.277.302-1.059 1.037-1.059 2.529s1.085 2.936 1.237 3.138c.151.202 2.135 3.261 5.173 4.571.722.311 1.286.497 1.726.637.725.23 1.385.197 1.906.12.581-.086 1.834-.751 2.087-1.478.253-.727.253-1.35.177-1.477-.076-.127-.278-.202-.588-.358z"/></svg>
    Pamer Skor ke WhatsApp
</a>
    </div>
</div>

<script>
    const quiz = [
        { q: "Makanan yang dibungkus daun kelapa?", a: "ketupat" },
        { q: "Tradisi pulang ke kampung halaman?", a: "mudik" },
        { q: "Lebaran Idul Fitri di rayakan pada tanggal berapa kalender hijriah?", a: "1 syawal" },
        { q: "Berapa kali takbir pada rakaat pertama sholat ied?", a: "7" },
        { q: "Minal 'Aidin wal Faizin artinya?", a: "Semoga kita termasuk orang-orang yang kembali ke fitrah dan meraih kemenangan" }
    ];

    let step = 0;
    let score = 0;
    let namaUser = "";
    const audio = document.getElementById('bgMusic');

    // Fungsi biar musik dipaksa nyala tiap ada interaksi
    function forceMusic() {
        if (audio.paused && namaUser !== "") {
            audio.play().then(() => {
                document.getElementById('music-toggle').innerText = "🔊";
            }).catch(e => console.log("Menunggu interaksi..."));
        }
    }

    function toggleMusic() {
        const btn = document.getElementById('music-toggle');
        if (audio.paused) { audio.play(); btn.innerText = "🔊"; }
        else { audio.pause(); btn.innerText = "🔇"; }
    }

    function startQuiz() {
        namaUser = document.getElementById('sender-name').value;
        if (!namaUser) return alert("Nama jangan kosong ya!");
        
        audio.play().then(() => {
            document.getElementById('music-toggle').innerText = "🔊";
        });
        
        document.getElementById('intro-box').style.display = "none";
        document.getElementById('quiz-box').classList.remove('hidden');
        load();
    }

    function load() {
        document.getElementById('current-q').innerText = step + 1;
        document.getElementById('q-text').innerText = quiz[step].q;
        document.getElementById('ans-input').value = "";
        document.getElementById('key-hint').innerText = "";
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('ans-input').focus();
    }

    function check() {
        forceMusic(); // Cek lagi musik pas jawab
        const inputField = document.getElementById('ans-input');
        const input = inputField.value.toLowerCase().trim();
        const hint = document.getElementById('key-hint');
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.disabled = true;

        if (input.includes(quiz[step].a)) {
            score += 20;
            hint.innerText = "✅ BENAR! Jawaban: " + quiz[step].a.toUpperCase();
            hint.style.color = "var(--green-light)";
        } else {
            hint.innerText = "❌ SALAH! Jawaban: " + quiz[step].a.toUpperCase();
            hint.style.color = "var(--red)";
        }

        setTimeout(() => {
            step++;
            if (step < quiz.length) {
                load();
            } else {
                showFinal();
            }
        }, 1800); 
    }

    function showFinal() {
    document.getElementById('quiz-box').style.display = "none";
    const wishBox = document.getElementById('wish-box');
    const imgContainer = document.getElementById('result-img-container');
    const statusEl = document.getElementById('status-text');
    const wishEl = document.getElementById('final-wish');
    
    // Ambil elemen audio SFX
    const sfxWin = document.getElementById('sfxWin');
    const sfxLose = document.getElementById('sfxLose');
    
    // Matikan musik utama sebentar biar SFX kedengeran jelas (Opsional)
    audio.volume = 0.2; 

    wishBox.classList.remove('hidden');
    document.getElementById('final-score').innerText = score;
    document.getElementById('from-text').innerText = "Untuk: " + namaUser;

    if (score >= 80) {
        // --- JIKA CERDAS ---
        sfxWin.play();
        statusEl.innerText = "✨ CERDAS ✨";
        statusEl.style.color = "var(--gold)";
        imgContainer.innerHTML = `<img src="https://media.giphy.com/media/2YO6J0WGjM8zkqnS71/giphy.gif" class="giphy-img">`;
        wishEl.innerHTML = "Selamat Idul Fitri! Maaf lahir batin. Orang cerdas kayak kamu gak perlu MBG 🕺";
        startFalling("✨"); 
    } else {
        // --- JIKA KURANG GIZI ---
        sfxLose.play();
        statusEl.innerText = "❌ KURANG GIZI ❌";
        statusEl.style.color = "var(--red)";
        imgContainer.innerHTML = `<img src="https://media.giphy.com/media/Wmfhh36FNLZaXtfhdr/giphy.gif" class="giphy-img">`;
        wishEl.innerHTML = "Maaf, sepertinya anda memerlukan MBG. <br><br> Tapi gapapa, Selamat Lebaran! mohon maaf lahir dan batin ya 🙏";
        startFalling("🤪");
    }
    
    // Balikin volume musik utama setelah 3 detik
    setTimeout(() => { audio.volume = 0.7; }, 3000);
    }

    function startFalling(icon) {
        setInterval(() => {
            const item = document.createElement('div');
            item.className = "falling-item";
            item.innerText = icon;
            item.style.left = Math.random() * 95 + "vw";
            item.style.transition = "all 5s linear";
            document.body.appendChild(item);
            setTimeout(() => {
                item.style.transform = `translateY(${window.innerHeight + 100}px)`;
                item.style.opacity = "0";
            }, 100);
            setTimeout(() => item.remove(), 5500);
        }, 400);
        // Logika Pesan WhatsApp Otomatis
const waLink = document.getElementById('wa-share');
let pesanStatus = (score >= 80) ? "Gue dapet gelar CERDAS! 😎" : "Gue disuruh makan MBG 😭";

// Gabungkan Nama, Skor, dan Link Web kamu
const teksWA = `Woi! Gue abis ikut Kuis Lebaran.\n\nNama: ${namaUser}\nSkor: ${score}\nHasil: ${pesanStatus}\n\nCoba adu pengetahuan lo di sini: ${window.location.href}`;

// Masukkan ke link tombol
waLink.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(teksWA);
    }
</script>
</body>
                                                                                                           </html>
